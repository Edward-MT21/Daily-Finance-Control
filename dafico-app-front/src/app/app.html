@if (userService.currentUser()) {
  <header class="main-header">
    <div class="logo-container" routerLink="/record">
      <span class="logo-icon">D</span>
      <h1 class="brand-name">DAFICO</h1>
    </div>
    
    <nav class="main-nav">
      <button routerLink="/transaction-record" routerLinkActive="active-link">Register movement</button>
      <button routerLink="/transaction-list" routerLinkActive="active-link">See Movements</button>
      <button routerLink="/category-summary" routerLinkActive="active-link">Summary by category</button>
      <button routerLink="/financial-charts" routerLinkActive="active-link">Financial Analysis</button>
      <button class="logout-btn" (click)="userService.logout()">
        Logout
      </button>
    </nav>
  </header>
}

<main class="content-wrapper">
  <router-outlet></router-outlet>
</main>
