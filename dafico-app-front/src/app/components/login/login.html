<div class="login-container">
  <div class="login-card">
    <h2>Welcome to Dafico</h2>
    <p>Enter your credentials to continue</p>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="You username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••">
      </div>

      @if (errorMessage) {
        <p class="error-msg">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="loginForm.invalid">Enter</button>
    </form>
    
    <p class="footer-text">Don't have an account? Contact the administrator.</p>
  </div>
</div>
